name: Deploy Gateway

on:
  push:
    branches: [main, feature/gateway2, feature/gateway, feature/gateway1, feature/gateway-setup]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ppraimm/gateway:latest

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no root@185.23.34.25 << 'EOF'
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            docker pull ghcr.io/ppraimm/gateway:latest
            docker stop gateway || true
            docker rm gateway || true
            docker run -d \
              --name gateway \
              --restart always \
              -p 8081:8081 \
              -e PORT=8081 \
              -e BACKEND_URL=http://host.docker.internal:8080 \
              -e STREAMING_URL=http://host.docker.internal:8082 \
              --add-host host.docker.internal:host-gateway \
              --env-file /root/.env \
              ghcr.io/ppraimm/gateway:latest
            docker image prune -f
          EOF
